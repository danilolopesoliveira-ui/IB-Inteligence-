services:
  - type: web
    name: ib-agents-dashboard
    runtime: python
    buildCommand: pip install -r requirements-render.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn cost_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
